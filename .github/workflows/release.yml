name: Release

# Cut a release when a vX.Y.Z tag is pushed: build static Linux binaries, package
# them (.deb/.rpm/tar.gz), checksum + SBOM + keyless Sigstore signature, and publish
# a GitHub Release with all artifacts attached.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build, e.g. v1.0.0"
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            cross: false
          - target: aarch64-unknown-linux-musl
            cross: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (native target)
        if: ${{ !matrix.cross }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (foreign target)
        if: ${{ matrix.cross }}
        run: cargo install cross --locked

      - name: Build static binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target "${{ matrix.target }}" -p systui-cli
          else
            cargo build --release --target "${{ matrix.target }}" -p systui-cli
          fi

      - name: Stage tarball
        run: |
          ver="${TAG#v}"
          name="systui-$ver-${{ matrix.target }}"
          mkdir -p stage
          cp "target/${{ matrix.target }}/release/systui" stage/
          cp LICENSE-MIT LICENSE-APACHE README.md packaging/systui.1 stage/
          tar -C stage -czf "$name.tar.gz" .
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.target }}
          path: "*.tar.gz"

  publish:
    name: package, sign & publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create the release
      id-token: write      # keyless cosign OIDC
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: archive-*
          merge-multiple: true

      - name: Collect tarballs
        run: |
          mkdir -p release
          mv artifacts/*.tar.gz release/

      - name: Install nfpm
        run: |
          NFPM_VER=2.41.0
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/nfpm_${NFPM_VER}_amd64.deb" -o /tmp/nfpm.deb
          sudo dpkg -i /tmp/nfpm.deb

      - name: Build .deb and .rpm
        run: |
          ver="${TAG#v}"
          for pair in "x86_64-unknown-linux-musl amd64" "aarch64-unknown-linux-musl arm64"; do
            set -- $pair; triple=$1; arch=$2
            mkdir -p dist
            tar -C dist -xzf "release/systui-$ver-$triple.tar.gz"
            SYSTUI_VERSION="$ver" SYSTUI_ARCH="$arch" nfpm package -f packaging/nfpm.yaml -p deb -t release/
            SYSTUI_VERSION="$ver" SYSTUI_ARCH="$arch" nfpm package -f packaging/nfpm.yaml -p rpm -t release/
          done

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: release/systui.spdx.json

      - name: Checksums
        run: cd release && sha256sum -- * > SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums (keyless Sigstore)
        run: |
          cd release
          cosign sign-blob --yes SHA256SUMS --bundle SHA256SUMS.cosign.bundle

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: release/*
          generate_release_notes: true
